name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build web (Expo export, pinned to prod)
        run: EXPO_PUBLIC_ENV=prod npx expo export -p web

      - name: Assert prod bundle (refuse to ship a dev build to live)
        run: EXPO_PUBLIC_ENV=prod node scripts/assert-prod-bundle.js

      - name: Deploy to Firebase Hosting (live)
        uses: FirebaseExtended/action-hosting-deploy@v0.10.0
        # v0.10.0 (latest tag) still declares the Node 20 runtime, which GitHub
        # forces to Node 24 on 2026-06-16 and removes on 2026-09-16. Opt into
        # Node 24 now so the deploy keeps working; drop this once the action
        # ships a release built on node24.
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: fanfest-app
          channelId: live
